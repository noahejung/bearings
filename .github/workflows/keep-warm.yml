name: Keep Render service warm

# --- WHY THIS WORKFLOW EXISTS ---
#
# bearings is deployed on Render's FREE instance plan (see render.yaml).
# Render's free tier spins a service down after ~15 minutes of no inbound
# traffic. Noah put https://bearings.onrender.com/ on his resume. A
# recruiter clicking that link while the service is asleep sees a blank
# tab and closes it -- a live URL that behaves like a dead one is worse
# than no URL at all. This workflow's job is to ping the app often enough
# to reduce (not eliminate -- see caveats below) the odds of that
# happening. DO NOT delete this thinking it's a no-op -- even a
# best-effort, frequently-dropped ping is strictly better than zero ping,
# and it costs nothing on this account (see caveat #3).
#
# Pings GET /api/health, never /api/profile -- /api/profile calls live NYC
# Socrata/GeoSearch/MTA APIs per request (see src/bearings/api.py) and a
# ping every few minutes against those would burn rate limits for no
# reason. /api/health does no outbound network calls at all (see
# render.yaml's own healthCheckPath comment) -- it's the cheapest possible
# thing that still touches the live app and forces Render to see traffic.
#
# --- HONEST CAVEATS (read before assuming this is bulletproof) ---
#
# 1. GitHub's own docs (docs.github.com, "Events that trigger workflows" ->
#    schedule, re-verified live 2026-07-18) state plainly: "The schedule
#    event can be delayed during periods of high loads of GitHub Actions
#    workflow runs. High load times include the start of every hour. If
#    the load is sufficiently high enough, some queued jobs may be
#    dropped." This is not a rare edge case for this workflow -- it is the
#    DOMINANT behavior. `gh run list --workflow=keep-warm.yml` on
#    2026-07-18, with the cron below set to fire every 10 minutes
#    (offset off the top-of-hour mark specifically to dodge the congestion
#    GitHub calls out), showed real runs landing ~50-100+ minutes apart,
#    not ~10. That means the large majority of scheduled attempts were
#    silently dropped by GitHub's own scheduler, not delayed-and-caught-up
#    -- there is no way to make a cron expression fix this; it is a
#    platform-level best-effort guarantee, confirmed both in GitHub's own
#    docs and in this account's actual run history.
# 2. GitHub auto-disables scheduled workflows on a repo after 60 days with
#    NO repository activity (pushes/commits -- the scheduled runs
#    themselves do not count as "activity" for this purpose). As long as
#    this repo keeps receiving normal commits at least that often, this is
#    a non-issue; if the repo ever goes fully dormant, this workflow will
#    silently stop firing and nobody will be notified.
# 3. This repo is PUBLIC (confirmed live via `gh repo view` / `gh api
#    repos/noahejung/bearings`, and has been since 2026-07-13 --
#    predating this workflow's own original commit). GitHub Actions usage
#    on standard GitHub-hosted runners is FREE and effectively unlimited
#    for public repositories (docs.github.com, "About billing for GitHub
#    Actions": "GitHub Actions usage is free ... for public repositories
#    that use standard GitHub-hosted runners"). An earlier version of this
#    comment asserted the repo was private and used private-repo minute
#    quotas (2,000/month on GitHub Free) to argue that any cadence tight
#    enough to matter was unaffordable -- that was wrong when it was
#    written, not something that changed since (the PublicEvent on this
#    repo predates that commit). Minutes cost is NOT what limits this
#    workflow. Caveat #1 above -- GitHub's scheduler dropping most
#    attempts under load -- is the real, and only, structural limit, and
#    it is not fixable from this file.
# 4. Because minutes are free here, the cron below is set to GitHub's
#    documented floor (every 5 minutes -- "The shortest interval you can
#    run scheduled workflows is once every 5 minutes," same docs page as
#    caveat #1) rather than 10. This can only help (more attempts per
#    hour raises the odds that at least one lands inside Render's
#    15-minute window) -- it does NOT fix caveat #1, and Noah should not
#    read "still yellow/red sometimes" as this file being broken.
# 5. If Noah ever wants an actual guarantee instead of improved odds, the
#    real fixes are outside GitHub Actions entirely: an external uptime
#    pinger (UptimeRobot / cron-job.org / Better Uptime free tiers all run
#    on their own scheduler, not GitHub's, and are built for exactly this)
#    or Render's paid Starter plan, which removes the 15-minute idle
#    spin-down altogether (render.yaml's own comment: Starter does NOT
#    raise RAM, only removes the spin-down and adds CPU). Neither is
#    implemented here -- both need Noah's own account/billing decision.

on:
  schedule:
    # Every 5 minutes (GitHub's documented floor), offset 3 minutes off
    # the top-of-hour marks (3,8,13,...,58 rather than */5) to dodge the
    # top-of-hour congestion spike GitHub's own docs call out -- see
    # caveat #1. This reduces the odds of a dropped/delayed run; it does
    # not eliminate them, and it cannot -- see caveats #1 and #4.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # --max-time was previously 20s -- shorter than this app's own
      # measured cold-boot time. A live measurement dispatch (2026-07-18,
      # see that report for methodology) timed a real GET /api/health
      # after Render idle spin-down at 32.4s end-to-end (Render's own
      # container spin-up plus this app's `lifespan` warm-up, which blocks
      # on the POI table, GTFS feeds, transit graph, anchor times, and
      # per-cell precompute before the socket even opens -- see api.py's
      # own lifespan docstring). A 20s timeout meant this workflow reported
      # FAILURE on every single cold hit even when the ping had correctly
      # triggered a boot that went on to succeed a few seconds later --
      # that's the false-failure noise this fix removes. 90s gives ~2.8x
      # margin over the one real measurement available (Render's own
      # spin-up time isn't guaranteed constant run to run). If a run still
      # times out at 90s, that's worth investigating for real (an actual
      # boot regression), not dismissed as "just cold."
      - name: GET /api/health (fails the job on anything but 200)
        run: |
          curl --fail-with-body -sS --max-time 90 \
            https://bearings.onrender.com/api/health
